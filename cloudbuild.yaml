# ============================================================
#  cloudbuild.yaml — Google Cloud Build pipeline
#  Builds, pushes, and deploys autodebug-agent to Cloud Run
# ============================================================

steps:
  # ------------------------------------------------------------------
  # Step 1: Build the Docker image
  # ------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/autodebug:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/autodebug:latest"
      - "."

  # ------------------------------------------------------------------
  # Step 2: Push the image to Container Registry
  # ------------------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/autodebug:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/autodebug:latest"

  # ------------------------------------------------------------------
  # Step 3: Deploy to Cloud Run
  # ------------------------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "autodebug"
      - "--image"
      - "gcr.io/$PROJECT_ID/autodebug:$SHORT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "GEMINI_API_KEY=${_GEMINI_API_KEY},GITLAB_TOKEN=${_GITLAB_TOKEN},GITLAB_PROJECT_ID=${_GITLAB_PROJECT_ID},GITLAB_URL=${_GITLAB_URL}"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--timeout"
      - "120"

# Push the built images to GCR
images:
  - "gcr.io/$PROJECT_ID/autodebug:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/autodebug:latest"

# User-supplied substitutions (set via Cloud Build triggers or CLI)
substitutions:
  _GEMINI_API_KEY: ""
  _GITLAB_TOKEN: ""
  _GITLAB_PROJECT_ID: ""
  _GITLAB_URL: "https://gitlab.com"

options:
  logging: CLOUD_LOGGING_ONLY
